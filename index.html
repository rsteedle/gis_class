<html>

<link rel="stylesheet" href="my-style.css">
<script type="text/javascript" src="scripts.js"></script>

<h1>Pick a sad winter tree!</h1>
 
  <div id="tree-list">
 
    <div class="tree" onclick="showImage('cherry', 'event')">
      <img src="https://www.lve-baumschule.com/media/ae/ac/17/1646917073/6901161.JPG" alt="Cherry">
      <p>Cherry <br/>
        <i>Prunus serrulata</i> 
      </p>
    </div>
 
    <div class="tree" onclick="showImage('dogwood', 'event')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Cornus_florida_%28Flowering_Dogwood%29_%2833570388976%29.jpg/960px-Cornus_florida_%28Flowering_Dogwood%29_%2833570388976%29.jpg?_=20191216034202" alt="Dogwood">
      <p>Dogwood <br/>
        <i> Cornus florida </i>
        </p>
    </div>
 
    <div class="tree" onclick="showImage('poplar', 'event')">
      <img src="https://media.istockphoto.com/id/507206878/photo/image-of-tall-deciduous-lombardy-poplar-tree-without-leaves.jpg?s=612x612&w=0&k=20&c=FKFk87y2xN6JvlKEydVNLMRytVcYl4egv9c6ExgDnaE=" alt="poplar">
      <p>Poplar </br>
        <i>Populus nigra</i>
        </p>
    </div>
 

 </div>

<div id="popup-overlay"></div>


  <!-- popup, shown when a tree is clicked -->
<div class = "popup" id = "popup_id" >
  <h1> Spring is coming! </h1>
  
  <div id = "summer-pic-container"> 
  <button id="popup-close" onclick="closePopup()">Close</button>

  </div>

</div>
  

</html>
